services:
  nginx:
    build: ./nginx
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ${MAIN_SITE_DIR}:/var/www/main:ro
    environment:
      - MAIN_SITE_HOST=${MAIN_SITE_HOST}
